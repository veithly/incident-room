<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6f4eb;
      --muted: #b7b0a2;
      --line: rgba(246, 244, 235, 0.18);
      --orange: #ff4500;
      --cyan: #5eead4;
      --panel: rgba(19, 23, 28, 0.84);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1920px;
      height: 1200px;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(255, 69, 0, 0.16), transparent 32%),
        radial-gradient(circle at 82% 12%, rgba(94, 234, 212, 0.16), transparent 26%),
        #11161c;
      color: var(--ink);
    }
    .stage {
      position: relative;
      width: 1920px;
      height: 1200px;
      padding: 72px;
    }
    .plate {
      position: absolute;
      inset: 54px;
      border: 1px solid var(--line);
      background: #141922;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }
    .plate::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 13, 18, 0.12), rgba(10, 13, 18, 0.2) 48%, rgba(10, 13, 18, 0.76));
      pointer-events: none;
    }
    .plate-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.015);
    }
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
      width: 100%;
      height: 100%;
      padding: 360px 112px 220px;
      background:
        linear-gradient(90deg, rgba(255, 69, 0, 0.11) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 72px 72px;
    }
    .signal-grid section {
      min-height: 310px;
      padding: 38px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.055);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .signal-grid span {
      font-size: 25px;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .signal-grid strong {
      font-size: 42px;
      line-height: 1.08;
      font-weight: 760;
    }
    .caption {
      position: absolute;
      left: 112px;
      right: 112px;
      bottom: 92px;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 36px;
      align-items: end;
    }
    .copy {
      padding: 36px 40px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .kicker {
      margin: 0 0 18px;
      font-size: 24px;
      color: var(--cyan);
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      max-width: 1150px;
      font-size: 67px;
      line-height: 1;
      font-weight: 790;
    }
    .body {
      margin: 22px 0 0;
      max-width: 980px;
      color: var(--muted);
      font-size: 30px;
      line-height: 1.3;
    }
    .stat {
      min-height: 178px;
      padding: 30px;
      background: rgba(255, 69, 0, 0.86);
      display: flex;
      align-items: center;
      font-size: 37px;
      line-height: 1.08;
      font-weight: 780;
      color: #fff;
    }
    .brand {
      position: absolute;
      z-index: 3;
      top: 88px;
      left: 100px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: white;
      font-weight: 760;
      font-size: 28px;
    }
    .mark {
      width: 48px;
      height: 48px;
      background: var(--orange);
      display: grid;
      place-items: center;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="brand"><div class="mark">IR</div><span>Incident Room</span></div>
    <section class="plate"><img class="plate-image" src="file:///C:/Users/Ricky/Documents/Project/HackathonHunter/incidentroom/docs/ui-mockups/03-briefing-action-pack.png" alt="" /></section>
    <section class="caption">
      <div class="copy">
        <p class="kicker">Rules plus AI</p>
        <h1>Rules score the evidence; Step AI explains the shape of the incident</h1>
        <p class="body">The model summarizes likely pattern, safest action pack to review, and caveats. It cannot mutate Reddit content.</p>
      </div>
      <aside class="stat">Moderator-controlled decisions</aside>
    </section>
  </main>
</body>
</html>
